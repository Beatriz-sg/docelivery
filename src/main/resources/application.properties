spring.application.name=docelivey

# SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=docelivey;integratedSecurity=false;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=@ITB123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

#Informações
#integratedSecurity: (true) Indica que a conexões será feita com as credenciais do Windows, (false) credencial do SQL Server
#encrypt: (true) Requer criptografia do cliente, (false) nao requer criptografia do cliente
#trustServerCertificate: (true) Instrui o aplicativo cliente a ignorar a validação do certificado SSL/TSL do servidor

# spring.jpa.hibernate.ddl-auto
     # nane : Banco de dados e tabelas devem ser criados com antecendência
     # update : Banco de dados dever ser criado com antecendênia, tabelas podem ser criadas com antecendência, as tabelas são atualizadas pelo código (model)
     # create-drop: Banco de dados deve ser criado com antencedência, as tabelas são criadas automaticamente pelo código (model), entretando as tabelas
     #               serão excluídas toda vez que o servidor é "desligado"
     # create: Banco de dados dece ser criado com antencedência, quando o servidor carregar as tabelas são recriadas, as tabelas não serão excluídas
     #         quando o servidor é "desligado"